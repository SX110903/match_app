<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Verifica tu email</title></head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h2 style="color: #e91e8c;">¡Bienvenido a MatchHub, {{.Name}}!</h2>
  <p>Gracias por registrarte. Por favor verifica tu email haciendo clic en el botón de abajo:</p>
  <a href="{{.URL}}"
     style="display: inline-block; background: #e91e8c; color: white; padding: 12px 24px;
            text-decoration: none; border-radius: 6px; margin: 16px 0;">
    Verificar Email
  </a>
  <p style="color: #666; font-size: 14px;">Este enlace expira en 24 horas.</p>
  <p style="color: #666; font-size: 12px;">Si no creaste una cuenta, ignora este mensaje.</p>
</body>
</html>
