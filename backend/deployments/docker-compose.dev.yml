version: '3.9'

services:
  backend:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.dev
    restart: unless-stopped
    env_file: ../.env
    ports:
      - "8080:8080"
    volumes:
      - ..:/app
      - ../keys:/keys:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dev

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: matchhub
      MYSQL_USER: matchhub_user
      MYSQL_PASSWORD: devpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ../internal/database/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - dev
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  dev:
    driver: bridge

volumes:
  mysql_dev_data:
